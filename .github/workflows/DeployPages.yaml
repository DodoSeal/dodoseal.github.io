name: "Deploy GitHub Pages"

on:
  workflow_dispatch:

    # push:
    #     branches:
    #         - master

jobs:
    build:
        name: "Build Svelte & Deploy Website"
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
       
            # - name: Set up Node.js
            #   uses: actions/setup-node@v4
            #   with:
            #     node-version: 'lts/*'
            #     cache: 'npm'

            - name: "Update Packages"
              run: npm install
            
            - name: "Build Svelte"
              run: npm run build

            - name: "Create CNAME"
              run: echo 'dodoseal.com' > build/CNAME

            - name: Deploy GitHub pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: ./build